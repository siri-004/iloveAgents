name: Bug Report
description: Something is broken or not working right
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill this out so I can understand and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      placeholder: When I click Run on the Code Reviewer agent, nothing happens...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How do I reproduce it?
      placeholder: |
        1. Open the Code Reviewer agent
        2. Paste some code
        3. Click Run
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the output to appear in the output panel.
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Which provider were you using?
      options:
        - OpenAI
        - Anthropic
        - Google Gemini
        - Not applicable
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome on Windows 11
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Screenshots or error messages (optional)
      description: Paste any errors from the browser console or attach a screenshot.
