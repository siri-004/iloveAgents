name: Feature Request
description: Suggest something new or an improvement to the platform
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? I would love to hear it.
        If you want to suggest a new agent, please use the New Agent Proposal template instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Right now there is no way to copy the output as plain text...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      placeholder: A "Copy as plain text" button next to the existing copy button.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Any other ideas you considered? (optional)
      placeholder: I also thought about a toggle to switch between rendered and raw output...

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app is this about?
      options:
        - Agent Runner
        - Homepage / Agent Grid
        - API Key / Provider Bar
        - Output Panel
        - Sidebar / Navigation
        - Mobile Experience
        - Performance
        - Other
    validations:
      required: true
