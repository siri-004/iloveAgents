name: Thank Contributor on Merge

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  thank-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Post thank you comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🎉 Your contribution has been merged and is now live on [iloveagents.vercel.app](https://iloveagents.vercel.app)!

Thank you for taking the time to contribute to iloveAgents — it genuinely means a lot. Every contribution, big or small, makes this project better for everyone who uses it.

If you haven't already, please consider ⭐ **starring the repo** — it helps others discover iloveAgents and keeps the community growing. [Star it here](https://github.com/AditthyaSS/iloveAgents)

Hope to see you again soon. You are always welcome here. 🙌

— [@AditthyaSS](https://github.com/AditthyaSS)`
            });
