name: Thank Contributor on Merge

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  thank-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Post thank you comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🎉 Your contribution has been merged and is now live on [iloveagents.vercel.app](https://iloveagents.vercel.app)!

            Thank you for taking the time to contribute to iloveAgents — it genuinely means a lot. Every contribution, big or small, makes this project better for everyone who uses it.

            If you haven't already, please consider ⭐ **starring the repo** — it helps others discover iloveAgents and keeps the community growing.

            Hope to see you again soon. You are always welcome here. 🙌

            — [@AditthyaSS](https://github.com/AditthyaSS)
